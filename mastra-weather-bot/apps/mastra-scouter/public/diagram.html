<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Diagrama de flujo — Mastra Scouter</title>
    <script type="module">
      import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
      mermaid.initialize({
        startOnLoad: false,
        theme: 'base',
        themeVariables: {
          primaryColor: '#f5f0e7',
          primaryTextColor: '#251f1c',
          primaryBorderColor: '#0d6f73',
          lineColor: '#71645d',
          secondaryColor: '#fff8ee',
          tertiaryColor: '#f0ece4',
          fontFamily: '"SF Mono", "Fira Code", monospace',
          fontSize: '13px',
        },
        flowchart: { curve: 'basis', padding: 16 },
      });

      const params = new URLSearchParams(location.search);
      const project = params.get('project');
      const traceId = params.get('trace');
      const title = document.getElementById('title');
      const container = document.getElementById('diagram');
      const errorBox = document.getElementById('error');

      if (!project || !traceId) {
        errorBox.textContent = 'Faltan los parametros project y trace en la URL.';
      } else {
        title.textContent = `${project} — trace ${traceId.slice(0, 12)}…`;
        try {
          const res = await fetch(`/api/projects/${project}/traces/${traceId}`);
          const payload = await res.json();
          if (!res.ok) throw new Error(payload.error || 'Error cargando trace');
          const definition = buildMermaid(payload.trace.spans);
          const { svg } = await mermaid.render('mermaid-output', definition);
          container.innerHTML = svg;
        } catch (err) {
          errorBox.textContent = err.message;
        }
      }

      function sanitizeLabel(text) {
        return text.replace(/["\[\](){}|<>#&]/g, ' ').replace(/\s+/g, ' ').trim();
      }

      function nodeShape(spanType, id, label) {
        if (spanType.includes('agent')) return `${id}([${label}])`;
        if (spanType.includes('tool')) return `${id}[/${label}/]`;
        if (spanType.includes('model') && !spanType.includes('chunk')) return `${id}{{${label}}}`;
        if (spanType.includes('workflow')) return `${id}[[${label}]]`;
        return `${id}[${label}]`;
      }

      function spanStyle(spanType) {
        if (spanType.includes('agent')) return 'fill:#f3edff,stroke:#8a4fff,color:#251f1c';
        if (spanType.includes('tool')) return 'fill:#fff4ec,stroke:#c95a20,color:#251f1c';
        if (spanType.includes('model') && !spanType.includes('chunk')) return 'fill:#e8f0ff,stroke:#0047ab,color:#251f1c';
        if (spanType.includes('workflow')) return 'fill:#edf8f0,stroke:#1f8f4e,color:#251f1c';
        return 'fill:#f5f0e7,stroke:#71645d,color:#251f1c';
      }

      function buildMermaid(spans) {
        const lines = ['flowchart LR'];
        const styles = [];
        let counter = 0;

        function walk(nodes, parentId) {
          for (const span of nodes) {
            const id = `n${counter++}`;
            const duration = span.durationMs != null ? ` (${span.durationMs}ms)` : '';
            const label = sanitizeLabel(`${span.name}${duration}`);
            lines.push(`    ${nodeShape(span.spanType, id, label)}`);
            styles.push(`style ${id} ${spanStyle(span.spanType)}`);

            if (parentId) {
              const edgeLabel = sanitizeLabel(span.spanType.replace(/_/g, ' '));
              lines.push(`    ${parentId} -->|${edgeLabel}| ${id}`);
            }

            if (span.children && span.children.length > 0) {
              walk(span.children, id);
            }
          }
        }

        walk(spans, null);
        lines.push(...styles);
        return lines.join('\n');
      }
    </script>
    <style>
      * { box-sizing: border-box; margin: 0; }
      body {
        min-height: 100vh;
        background:
          radial-gradient(circle at top left, rgba(13,111,115,0.12), transparent 32%),
          linear-gradient(180deg, #f5f0e7, #ece5da);
        font-family: "Iowan Old Style", "Palatino Linotype", Palatino, serif;
        color: #251f1c;
        padding: 24px;
      }
      header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
      }
      header h1 { font-size: 1.1rem; font-weight: 600; }
      .header-links { display: flex; gap: 16px; }
      .header-links a {
        color: #0d6f73;
        text-decoration: none;
        font-size: 0.9rem;
      }
      .header-links a:hover { text-decoration: underline; }
      #error {
        color: #c95a20;
        font-weight: 600;
        margin-bottom: 12px;
      }
      #diagram {
        background: rgba(255,251,245,0.82);
        border: 1px solid rgba(37,31,28,0.12);
        border-radius: 12px;
        padding: 24px;
        overflow: auto;
      }
      #diagram svg {
        max-width: 100%;
        height: auto;
      }
      .legend {
        display: flex;
        gap: 14px;
        font-size: 0.82rem;
        color: #71645d;
        margin-top: 16px;
      }
      .legend i {
        display: inline-block;
        width: 10px;
        height: 10px;
        border-radius: 50%;
        margin-right: 4px;
        vertical-align: middle;
      }
      .legend .agent { background: #8a4fff; }
      .legend .model { background: #0047ab; }
      .legend .tool { background: #c95a20; }
      .legend .workflow { background: #1f8f4e; }
    </style>
  </head>
  <body>
    <header>
      <h1 id="title">Diagrama de flujo</h1>
      <div class="header-links">
        <a id="seq-link" href="#">Ver secuencia</a>
        <a href="/">Volver al Scouter</a>
      </div>
    </header>
    <p id="error"></p>
    <div id="diagram"></div>
    <div class="legend">
      <span><i class="agent"></i> Agente</span>
      <span><i class="model"></i> Modelo</span>
      <span><i class="tool"></i> Tool</span>
      <span><i class="workflow"></i> Workflow</span>
    </div>
    <script>
      document.getElementById('seq-link').href = '/sequence.html' + location.search;
    </script>
  </body>
</html>
